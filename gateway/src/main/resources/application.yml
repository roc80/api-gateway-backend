server:
  port: 9090

spring:
  application:
    name: gateway

  cloud:
    gateway:
      # 路由配置
      routes:
        # 后端服务路由
        - id: backend_route
          uri: http://localhost:8080
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

      # 全局跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# 日志配置
logging:
  level:
    org:
      springframework:
        cloud:
          gateway: debug
    com:
      zl:
        mjga:
          gateway: debug

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
